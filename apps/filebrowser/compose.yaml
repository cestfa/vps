services:
  filebrowser:
    image: hurlenko/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    volumes:
      - /opt:/srv/opt
      - /home:/srv/home
      - ${DOCKER_DATA_DIR}/filebrowser:/config
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
